<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>跳转淘宝</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #fff;
      color: #333;
      text-align: center;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: #ff4000;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .status {
      margin: 20px 0;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
    }

    /* 弹窗遮罩层 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    /* 弹窗内容 */
    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .modal-content h3 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
    }

    .modal-content .btn {
      margin: 10px 0;
    }

    .modal-close {
      margin-top: 15px;
      background: transparent;
      color: #666;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 10px;
    }

    .modal-close:hover {
      color: #333;
    }
  </style>
</head>

<body>
  <!-- 自定义弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <h3>欢迎访问</h3>
      <a href="https://kansailoyaltydev.prod.acquia-sites.com" class="btn btn-secondary" target="_blank"
        id="modalVisitSoraca">访问Soraca</a>
      <button class="modal-close" id="closeModal">关闭</button>
    </div>
  </div>

  <h2>打开淘宝</h2>
  <a href="alipays://">打开支付宝首页111</a>

  <div class="status" id="status">点击下方按钮打开淘宝App</div>
  <a src="alipay://platformapi/startapp?saId=10000003">打开支付宝</a>
  <button class="btn" id="openApp">打开淘宝App</button>
  <a href="https://kansailoyaltydev.prod.acquia-sites.com" class="btn btn-secondary" target="_blank"
    id="visitSoraca">访问Soraca</a>
  <a href="https://tb.cn/tYbZTlu" class="btn btn-secondary" target="_blank">下载淘宝App</a>

  <script>
    document.getElementById('openApp').addEventListener('click', function () {
      var status = document.getElementById('status');
      status.innerHTML = '正在尝试打开淘宝App...';

      // 淘宝URL Schemes
      var schemes = [
        'taobao://',
        'taobao://taobao.com',
        'tmall://',
        'tmall://page.tm'
      ];


    });

    // 页面加载完成后显示弹窗
    window.addEventListener('load', function () {
      var modal = document.getElementById('modal');
      modal.style.display = 'flex';
    });

    // 关闭弹窗
    document.getElementById('closeModal').addEventListener('click', function () {
      var modal = document.getElementById('modal');
      modal.style.display = 'none';
    });

    // 点击遮罩层关闭弹窗
    document.getElementById('modal').addEventListener('click', function (e) {
      if (e.target.id === 'modal') {
        e.target.style.display = 'none';
      }
    });
  </script>
</body>

</html>
